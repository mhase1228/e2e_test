    - generic [ref=e23]:
      - heading "このサイトはテスト自動化の学習用の練習サイトです。" [level=2] [ref=e24]
      - paragraph [ref=e25]:
        - text: Seleniumなどのブラウザテスト自動化を学習したい方が、実際にテストスクリプトを実行するための
        - strong [ref=e26]: テスト対象サイト
        - text: として作成されています。
      - paragraph [ref=e27]:
        - text: 書籍やブログなどでのサンプルやデモにもお使いいただけます。ライセンスは
        - link "MIT License" [ref=e28] [cursor=pointer]:
          - /url: https://github.com/takeyaqa/hotel-example-site/blob/master/LICENSE
        - text: です。
      - paragraph [ref=e29]: 自動テストの学習を目的として作成されていますが、テスト設計や技法の学習に使うことも可能です。
    - generic [ref=e31]:
      - heading "サイトの構成" [level=3] [ref=e32]
      - paragraph [ref=e33]: ホテルの予約サイトを模した作りになっています。ログイン・会員登録・ホテルの宿泊予約のそれぞれの入力フォームを用意しています。レスポンシブデザインに対応しているためモバイルブラウザでも表示できます。
      - heading "ご利用上の注意" [level=4] [ref=e34]
      - list [ref=e35]:
        - listitem [ref=e36]: 2020年7月時点でのGoogle Chromeの最新版で動作確認をしています。
        - listitem [ref=e37]: サイトはGitHub Pagesでホストされています。
        - listitem [ref=e38]:
          - text: 入力データについて
          - list [ref=e39]:
            - listitem [ref=e40]: データはブラウザのCookieおよびSession Storage、Local Storageに保存されます。
            - listitem [ref=e41]: DBなどサーバ側での保存はありません。
            - listitem [ref=e42]: HTMLの仕様上、フォームへの入力内容はURLの末尾に付加されて送信されます。Githubサーバのログなどに残る可能性があるのでお気をつけください。
        - listitem [ref=e43]: 負荷テストには利用しないでください。
        - listitem [ref=e44]: このサイトを利用することによって生じた損害などにつきましては、一切の責任を負いません。
      - heading "構成の詳細" [level=4] [ref=e45]
      - generic [ref=e46]:
        - generic [ref=e47]:
          - heading "ログイン画面" [level=5] [ref=e48]
          - paragraph [ref=e49]: シンプルなテキストインプットとボタンの画面です。ログイン情報はCookieに保存されます。会員登録画面で保存したユーザの他、登録済みのユーザ（下記）があります。
        - generic [ref=e50]:
          - heading "会員登録画面" [level=5] [ref=e51]
          - paragraph [ref=e52]: 複数種類のインプットがある画面です。この画面で登録したユーザはLocal Storageに保存され、ログインに使用することができるようになります。
        - generic [ref=e53]:
          - heading "マイページ画面" [level=5] [ref=e54]
          - paragraph [ref=e55]: ログイン後に表示される画面です。登録したユーザ情報が表示され、確認に使うことができます。また、新規登録したユーザの場合アイコン画像の設定と退会（情報削除）ができます。
      - separator [ref=e56]
      - generic [ref=e57]:
        - generic [ref=e58]:
          - heading "宿泊プラン一覧画面" [level=5] [ref=e59]
          - paragraph [ref=e60]: 「宿泊予約」のメニューから表示できる画面です。表示されるプランは「未ログイン」「一般会員」「プレミアム会員」によって変わります。プラン情報はAjaxで非同期に読み込まれます（トップの一つを除く）。
        - generic [ref=e61]:
          - heading "宿泊予約画面" [level=5] [ref=e62]
          - paragraph [ref=e63]: 宿泊の予約を行う画面です。新規ウィンドウで開きます。複数種類のインプットのほか、合計金額が入力内容で動的に計算され表示されます。基本料および宿泊数・人数の許容値は選択したプランで変わります。
        - generic [ref=e64]:
          - heading "宿泊予約確認画面" [level=5] [ref=e65]
          - paragraph [ref=e66]: 宿泊予約の確定後に表示される画面です。予約で入力した内容の確認表示があります。また、アニメーション付きのダイアログが表示されます。
